name: Actualizar datos del colegio

on:
  schedule:
    - cron: '0 0 * * *'      # Todos los días a las 00:00
  workflow_dispatch:         # Permite ejecutarlo manualmente

permissions:
  contents: write            # ← Esta es la línea importante que faltaba

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: Ejecutar script Python
        run: python Generar_datos.py

      - name: Subir cambios
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add eventos.json menu.json fotos.json mensaje_dia.json
          git commit -m "Actualización automática diaria - $(date)" || echo "No hay cambios"
          git push
